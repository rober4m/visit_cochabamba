<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a30;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --text: #f0ede6;
    --muted: #7a7870;
    --accent: #d4574a;
    --sidebar-w: 360px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(160deg, #1c1c22, var(--surface));
  }

  .city-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .sidebar-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }
  .section-divider {
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: rgba(201,168,76,.06);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .sidebar-header h1 span { color: var(--gold); }

  .route-meta {
    display: flex;
    gap: 20px;
    margin-top: 14px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-val {
    font-size: 18px;
    font-weight: 500;
    color: var(--gold-light);
  }

  .meta-key {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
    margin: 4px 0;
  }

  /* ── PLACES LIST ── */
  .places-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .place-card {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 24px;
    cursor: pointer;
    transition: background 0.2s;
    border-left: 3px solid transparent;
    position: relative;
  }

  .place-card:hover { background: rgba(201,168,76,.07); }

  .place-card.active {
    background: rgba(201,168,76,.1);
    border-left-color: var(--gold);
  }

  .place-num {
    width: 34px;
    height: 34px;
    min-width: 34px;
    border-radius: 50%;
    background: var(--gold);
    color: #0d0d0f;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: transform 0.2s;
    box-shadow: 0 0 0 0 rgba(201,168,76,0);
  }

  .place-card.active .place-num {
    transform: scale(1.1);
    box-shadow: 0 0 14px rgba(201,168,76,.45);
  }

  .place-info { flex: 1; min-width: 0; }

  .place-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .place-type {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 5px;
  }

  .place-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .place-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 7px;
  }

  .place-duration {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .gmaps-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #4a90d9;
    text-decoration: none;
    background: rgba(74,144,217,.12);
    border: 1px solid rgba(74,144,217,.25);
    border-radius: 4px;
    padding: 3px 8px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .gmaps-btn:hover {
    background: rgba(74,144,217,.22);
    color: #7ab5f0;
  }

  .gmaps-btn svg {
    width: 10px; height: 10px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }

  .token-note {
    background: rgba(212,87,74,.12);
    border: 1px solid rgba(212,87,74,.25);
    border-radius: 6px;
    padding: 10px 12px;
    color: #e07d75;
    font-size: 11px;
    line-height: 1.5;
  }

  .token-note strong { color: var(--accent); }
  .token-note a { color: var(--gold); }

  /* ── MAP ── */
  #map-wrap {
    flex: 1;
    position: relative;
    height: 100vh;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* ── LOADING OVERLAY ── */
  #map-loading {
    position: absolute;
    inset: 0;
    background: rgba(13,13,15,.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 20;
    transition: opacity 0.4s;
  }

  #map-loading.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #map-loading span {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CUSTOM MARKER ── */
  .marker-wrap {
    position: absolute;
    cursor: pointer;
  }

  .marker-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #c9a84c;
    color: #0d0d0f;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,.55);
    transition: transform .2s, box-shadow .2s;
  }

  .marker-circle:hover, .marker-circle.active {
    transform: scale(1.18);
    box-shadow: 0 6px 20px rgba(201,168,76,.6);
  }

  .marker-tail {
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 9px solid #fff;
    margin: -2px auto 0;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,.3));
  }

  /* ── POPUP ── */
  .mapboxgl-popup-content {
    background: #16161a !important;
    color: #f0ede6 !important;
    border: 1px solid #2a2a30 !important;
    border-radius: 10px !important;
    padding: 14px 16px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
    font-family: 'DM Sans', sans-serif;
    min-width: 210px;
  }

  .mapboxgl-popup-tip {
    border-top-color: #16161a !important;
    border-bottom-color: #16161a !important;
  }

  .mapboxgl-popup-close-button {
    color: #7a7870 !important;
    font-size: 18px !important;
    padding: 4px 8px !important;
  }

  .popup-num {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 4px;
  }

  .popup-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #f0ede6;
  }

  .popup-meta {
    font-size: 11px;
    color: #7a7870;
    margin-bottom: 10px;
  }

  .popup-gmaps {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    color: #4a90d9;
    text-decoration: none;
    background: rgba(74,144,217,.12);
    border: 1px solid rgba(74,144,217,.25);
    border-radius: 5px;
    padding: 5px 10px;
    transition: background 0.15s;
  }

  .popup-gmaps:hover { background: rgba(74,144,217,.22); }

  /* ── ROUTE LEGEND ── */
  #route-legend {
    position: absolute;
    bottom: 30px;
    right: 20px;
    background: #16161a;
    border: 1px solid #2a2a30;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #7a7870;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 5;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }

  .legend-line {
    width: 28px;
    height: 3px;
    background: linear-gradient(90deg, #3a7bd5, #5a9ff5);
    border-radius: 2px;
  }

  #route-distance {
    font-size: 11px;
    color: #c9a84c;
    margin-left: 2px;
  }

  @media (max-width: 700px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; height: auto; max-height: 45vh; }
    #map-wrap { height: 55vh; }
  }
</style>
</head>

    desc: 'A popular family water park on the outskirts of the city offering pools, slides and green spaces — a refreshing escape on warm Cochabamba afternoons.',
    coords: [-66.17410980721878, -17.398567611994082],
    mapsUrl: 'https://maps.app.goo.gl/CWfYPXfwpRfZ4mtP9',
  },
  {

    coords: [-66.18831594163525, -17.396708153517917],

  {
    name: 'Parque Prehistórico Sacaba',

    coords: [-66.05273992016916, -17.396631479080625],

  {

    coords: [-66.32073148121067, -17.36477882792237],

  },
  {
    name: 'Parque Ecoturístico Pairumani',
    type: 'Nature Reserve',
    desc: 'A lush ecoturism park surrounding the Patiño estate, with native forests, walking trails and rich birdlife set against the dramatic backdrop of the Tunari mountains.',
    coords: [-66.33148161949272, -17.344884776583328],
    mapsUrl: 'https://maps.app.goo.gl/xDkmSenG5A2tUvGk7',
  },
  // add more...
];
// ─── SIDEBAR ─────────────────────────────────────────────────────
const list = document.getElementById('places-list');

places.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'place-card';
  card.dataset.index = i;
  card.innerHTML = `
    <div class="place-num">${i + 1}</div>
    <div class="place-info">
      <div class="place-type">${p.type}</div>
      <div class="place-name">${p.name}</div>
      <div class="place-desc">${p.desc}</div>
      <div class="place-actions">
        <span class="place-duration">⏱ ${p.duration}</span>
        <a class="gmaps-btn" href="${p.mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
          Maps
        </a>
      </div>
    </div>`;
  card.addEventListener('click', () => focusPlace(i));
  list.appendChild(card);
});

// ─── SIDEBAR Optional places ─────────────────────────────────────────────────────
const optionalList = document.getElementById('optional-list');

optionalPlaces.forEach((p, i) => {
  const letter = String.fromCharCode(65 + i); // 65 = 'A'
  const card = document.createElement('div');
  card.className = 'place-card';
  card.dataset.index = i;
  card.innerHTML = `
    <div class="place-num" style="background:#4a90d9;">${letter}</div>
    <div class="place-info">
      <div class="place-type">${p.type}</div>
      <div class="place-name">${p.name}</div>
      <div class="place-desc">${p.desc}</div>
      <div class="place-actions">
        <a class="gmaps-btn" href="${p.mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
          Maps
        </a>
      </div>
    </div>`;
  card.addEventListener('click', () => focusOptional(i));
  optionalList.appendChild(card);
});
// ─── MAP INIT ────────────────────────────────────────────────────
mapboxgl.accessToken = MAPBOX_TOKEN;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: [-66.1570, -17.3938],
  zoom: 11.5,
  attributionControl: false,
});

map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');
map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-left');

// ─── HELPERS ─────────────────────────────────────────────────────
function formatDistance(m) {
  return m >= 1000 ? (m / 1000).toFixed(1) + ' km' : Math.round(m) + ' m';
}

function formatDuration(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}

// ─── WALKING ROUTE — Mapbox Directions API ────────────────────────
// Profile: mapbox/walking  →  follows pedestrian streets & paths.
// The API supports up to 25 waypoints per request.
// We chain all stops as waypoints so the line follows real streets.
async function fetchWalkingRoute() {
  const waypoints = places.map(p => p.coords.join(',')).join(';');
  const url =
    `https://api.mapbox.com/directions/v5/mapbox/walking/${waypoints}` +
    `?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`;

  const res  = await fetch(url);
  const data = await res.json();

  if (!data.routes || !data.routes.length) return null;
  return data.routes[0]; // { geometry, distance, duration, … }
}

// ─── ON MAP LOAD ─────────────────────────────────────────────────
let activePopup = null;

map.on('load', async () => {

  // Fetch real walking route
  const route = await fetchWalkingRoute();

  // Hide loading overlay
  const overlay = document.getElementById('map-loading');
  overlay.classList.add('hidden');

  if (route) {
    // Update header stats
    document.getElementById('meta-dist').textContent = formatDistance(route.distance);
    document.getElementById('meta-time').textContent  = formatDuration(route.duration);
    document.getElementById('route-distance').textContent = formatDistance(route.distance);

    // ── Route drawn from real street geometry ──
    map.addSource('route', {
      type: 'geojson',
      data: { type: 'Feature', geometry: route.geometry },
    });

    // Soft glow underneath
    map.addLayer({
      id: 'route-glow',
      type: 'line',
      source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: {
        'line-color': '#3a7bd5',
        'line-width': 14,
        'line-opacity': 0.14,
        'line-blur': 10,
      },
    });

    // Dashed secondary line
    map.addLayer({
      id: 'route-dashed',
      type: 'line',
      source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: {
        'line-color': '#3a7bd5',
        'line-width': 3,
        'line-dasharray': [2, 3],
        'line-opacity': 0.45,
      },
    });

    // Solid core
    map.addLayer({
      id: 'route-line',
      type: 'line',
      source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: {
        'line-color': '#5a9ff5',
        'line-width': 2.5,
        'line-opacity': 0.95,
      },
    });
  }

  // ── Numbered markers at exact coords ──
  places.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'marker-wrap';
    el.innerHTML = `
      <div class="marker-circle" id="mc-${i}">${i + 1}</div>
      <div class="marker-tail"></div>`;

    new mapboxgl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat(p.coords)
      .addTo(map);

    el.addEventListener('click', () => focusPlace(i));
  });
  optionalPlaces.forEach((p, i) => {
  const letter = String.fromCharCode(65 + i);
  const el = document.createElement('div');
  el.className = 'marker-wrap';
  el.innerHTML = `
    <div class="marker-circle" style="background:#4a90d9;">${letter}</div>
    <div class="marker-tail" style="border-top-color:#4a90d9;"></div>`;

  new mapboxgl.Marker({ element: el, anchor: 'bottom' })
    .setLngLat(p.coords)
    .addTo(map);

  el.addEventListener('click', () => focusOptional(i));
});
  // Fit to all markers
  const bounds = places.reduce(
    (b, p) => b.extend(p.coords),
    new mapboxgl.LngLatBounds(places[0].coords, places[0].coords)
  );
  map.fitBounds(bounds, { padding: 70, maxZoom: 13 });
});

// ─── FOCUS PLACE ─────────────────────────────────────────────────
function focusPlace(i) {
  const p = places[i];

  // Sidebar highlight
  document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.place-card[data-index="${i}"]`);
  card.classList.add('active');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Marker highlight
  document.querySelectorAll('.marker-circle').forEach(m => m.classList.remove('active'));
  const mc = document.getElementById(`mc-${i}`);
  if (mc) mc.classList.add('active');

  // Fly
  map.flyTo({ center: p.coords, zoom: 15, speed: 1.2, curve: 1.4 });

  // Popup with Google Maps link
  if (activePopup) activePopup.remove();
  activePopup = new mapboxgl.Popup({ offset: 46, closeButton: true })
    .setLngLat(p.coords)
    .setHTML(`
      <div class="popup-num">Stop ${i + 1} of ${places.length}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-meta">${p.type} · ⏱ ${p.duration}</div>
      <a class="popup-gmaps" href="${p.mapsUrl}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#4a90d9">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
        </svg>
        Open in Google Maps
      </a>`)
    .addTo(map);
}
// ─── FOCUS OPTIONAL PLACES ─────────────────────────────────────────────────
function focusOptional(i) {
  const p = optionalPlaces[i];
  map.flyTo({ center: p.coords, zoom: 15, speed: 1.2 });

  if (activePopup) activePopup.remove();
  activePopup = new mapboxgl.Popup({ offset: 46, closeButton: true })
    .setLngLat(p.coords)
    .setHTML(`
      <div class="popup-num" style="color:#4a90d9;">Optional · ${String.fromCharCode(65 + i)}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-meta">${p.type}</div>
      <a class="popup-gmaps" href="${p.mapsUrl}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#4a90d9">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
        </svg>
        Open in Google Maps
      </a>`)
    .addTo(map);
}
</script>
</body>
